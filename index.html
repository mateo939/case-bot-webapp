<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELSER BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--tg-theme-hint-color, #a0a0a0);
            margin-bottom: 40px;
        }

        .login-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(64, 167, 227, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 50px;
            width: 100%;
            max-width: 280px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(64, 167, 227, 0.4);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-item span {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .menu-item p {
            font-size: 1rem;
            font-weight: 500;
            color: var(--tg-theme-text-color, #fff);
        }

        .info-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--tg-theme-hint-color, #a0a0a0);
        }

        .info-links a {
            color: var(--tg-theme-link-color, #40a7e3);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .info-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CELSER BOT</h1>
        <div class="subtitle">Открывай кейсы за звезды! ⭐️</div>

        <!-- Кнопка входа через Telegram (в Web App пользователь уже авторизован) -->
        <button class="login-btn" id="loginBtn">🚀 Войти с Telegram</button>
        <!-- Основное меню -->
        <div class="menu-grid">
            <div class="menu-item" id="openCases">
                <span>🎁</span>
                <p>Открыть кейсы</p>
            </div>
            <div class="menu-item" id="profile">
                <span>👤</span>
                <p>Мой профиль</p>
            </div>
        </div>

        <!-- Информационные ссылки -->
        <div class="info-links">
            <a href="#" id="about">О проекте</a>
            <a href="#" id="faq">Частые вопросы</a>
            <a href="#" id="support">Поддержка</a>
        </div>

        <div class="footer-note">
            v1.0 · Работает в Telegram
        </div>
    </div>

    <!-- Скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран
        tg.ready();  // Сообщаем, что приложение готово

        // Получаем данные пользователя (если доступны)
        const user = tg.initDataUnsafe?.user;
        if (user) {
            // Если пользователь уже авторизован, можно персонализировать приветствие
            document.querySelector('.subtitle').innerHTML = 'С возвращением, ${user.first_name}! ⭐️';
        }

        // Обработчик кнопки входа
        document.getElementById('loginBtn').addEventListener('click', () => {
            // Если пользователь не авторизован, можно показать сообщение или запросить данные
            if (!user) {
                tg.showPopup({
                    title: 'Вход',
                    message: 'Вы уже авторизованы через Telegram. Нажмите "Открыть кейсы", чтобы продолжить.',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                // Переход к открытию кейсов
                tg.showPopup({
                    title: 'Добро пожаловать!',
                    message: 'Вы вошли как ${user.first_name}. Нажмите "Открыть кейсы", чтобы начать.',
                    buttons: [{ type: 'ok' }]
                });
            }
        });

        // Обработчики меню
        document.getElementById('openCases').addEventListener('click', () => {
            // Здесь можно отправить данные боту или перейти на страницу с кейсами
            tg.sendData(JSON.stringify({ action: 'open_cases' }));
            // Альтернативно: показать уведомление и закрыть
            // tg.showPopup({ message: 'Функция открытия кейсов скоро появится!' });
        });

        document.getElementById('profile').addEventListener('click', () => {
            if (user) {
                tg.showPopup({
                    title: 'Профиль',
                    message: 'ID: ${user.id}\nИмя: ${user.first_name}\nБаланс: 100 ⭐️ (пример)',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                tg.showPopup({
                    title: 'Профиль',
                    message: 'Войдите, чтобы увидеть профиль.',
                    buttons: [{ type: 'ok' }]
                });
            }
        });

        // Обработчики информационных ссылок (можно открывать в браузере или показывать попап)
        document.getElementById('about').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({
                title: 'О проекте',
                message: 'CELSER BOT — это игровой бот, где вы можете открывать кейсы с подарками за звёзды Telegram.',
                buttons: [{ type: 'ok' }]
            });
        });

        document.getElementById('faq').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({
                title: 'Частые вопросы',
                message: 'Как получить звёзды?\nКак открыть кейс?\nКак вывести призы?',
                buttons: [{ type: 'ok' }]
            });
        });
        document.getElementById('support').addEventListener('click', (e) => {
            e.preventDefault();
            tg.openLink('https://t.me/your_support_bot'); // Замените на реальную ссылку поддержки
        });

        // Если нужно закрыть приложение
        // tg.close();
    </script>
</body>
</html>
