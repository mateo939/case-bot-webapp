<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CELSER BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('background.jpg');
            background-size: contain;
            background-position: top center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--tg-theme-bg-color, #1a1a2e); /* резервный цвет */
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2rem; /* чуть меньше */
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 28px;
        }

        .login-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 40px;
            width: 100%;
            max-width: 240px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(64, 167, 227, 0.4);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 14px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @media (max-width: 400px) {
    .menu-item {
        padding: 12px 6px;      /* Уменьшаем внутренние отступы */
    }
    .menu-item span {
        font-size: 1.6rem;       /* Немного уменьшаем иконку */
        margin-bottom: 4px;
    }
    .menu-item p {
        font-size: 0.8rem;       /* Уменьшаем текст */
    }
}

        .menu-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        .menu-item span {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .menu-item p {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--tg-theme-text-color, #fff);
        }

        .info-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .info-links a {
            color: var(--tg-theme-link-color, #40a7e3);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .info-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--tg-theme-hint-color, #777);
        }
        @media (max-width: 600px) {
    body {
        background-attachment: scroll; /* отключаем фиксацию */
    }
    .menu-item {
        padding: 10px 5px;   /* уменьшаем отступы */
    }
    .menu-item span {
        font-size: 1.4rem;   /* иконка мельче */
        margin-bottom: 2px;
    }
    .menu-item p {
        font-size: 0.75rem;  /* текст мельче */
    }
    .login-btn {
        padding: 10px 20px;  /* если кнопка входа тоже кажется крупной */
        font-size: 0.9rem;
        max-width: 200px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <h1>CELSER BOT</h1>
        <div class="subtitle">Открывай кейсы за звезды! ⭐️</div>

        <div class="menu-grid">
            <div class="menu-item" id="openCases">
                <span>🎁</span>
                <p>Открыть кейсы</p>
            </div>
            <div class="menu-item" id="profile">
                <span>👤</span>
                <p>Мой профиль</p>
            </div>
        </div>

        <div class="info-links">
            <a href="#" id="about">О проекте</a>
            <a href="#" id="faq">Частые вопросы</a>
            <a href="#" id="support">Поддержка</a>
        </div>

        <div class="footer-note">
            v1.0 · Работает в Telegram
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.querySelector('.subtitle').innerHTML = С возвращением, ${user.first_name}! ⭐️;
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            if (!user) {
                tg.showPopup({
                    title: 'Вход',
                    message: 'Вы уже авторизованы через Telegram. Нажмите "Открыть кейсы", чтобы продолжить.',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                tg.showPopup({
                    title: 'Добро пожаловать!',
                    message: Вы вошли как ${user.first_name}. Нажмите "Открыть кейсы", чтобы начать.,
                    buttons: [{ type: 'ok' }]
                });
            }
        });

        document.getElementById('openCases').addEventListener('click', () => {
            tg.sendData(JSON.stringify({ action: 'open_cases' }));
        });

        document.getElementById('profile').addEventListener('click', () => {
            if (user) {
                tg.showPopup({
                    title: 'Профиль',
                    message: ID: ${user.id}\nИмя: ${user.first_name}\nБаланс: 100 ⭐️ (пример),
                    buttons: [{ type: 'ok' }]
                });
            } else {
                tg.showPopup({
                    title: 'Профиль',
                    message: 'Войдите, чтобы увидеть профиль.',
                    buttons: [{ type: 'ok' }]
                });
            }
        });

        document.getElementById('about').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({
                title: 'О проекте',
                message: 'CELSER BOT — это игровой бот, где вы можете открывать кейсы с подарками за звёзды Telegram.',
                buttons: [{ type: 'ok' }]
            });
        });

        document.getElementById('faq').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({
                title: 'Частые вопросы',
                message: 'Как получить звёзды?\nКак открыть кейс?\nКак вывести призы?',
                buttons: [{ type: 'ok' }]
            });
        });

        document.getElementById('support').addEventListener('click', (e) => {
            e.preventDefault();
            tg.openLink('https://t.me/your_support_bot'); // замените на реальную ссылку
        });
    </script>
</body>
</html>
