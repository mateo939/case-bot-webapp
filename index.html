<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CELSER BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('background.jpg');
            background-size: auto 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            box-sizing: border-box;
        }

        .container {
            max-width: 360px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .menu-item {
            background: rgba(22, 33, 62, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 14px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        .menu-item span {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .menu-item p {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--tg-theme-text-color, #fff);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(22, 33, 62, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 8px 12px;
            margin-top: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #aaa);
            cursor: pointer;
            transition: color 0.2s;
            border-radius: 20px;
        }

        .nav-item.active {
            color: var(--tg-theme-button-color, #40a7e3);
            background: rgba(64, 167, 227, 0.2);
        }

        .timer {
            margin-top: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--tg-theme-button-color, #40a7e3);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        .profile-header {
            margin-bottom: 20px;
        }
        .welu {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .profile-id {
            font-size: 0.9rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 25px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--tg-theme-text-color, #fff);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-top: 4px;
        }

        .referral-block {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .referral-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .referral-subtitle {
            font-size: 0.8rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 15px;
        }

        .invite-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            transition: transform 0.2s;
        }

        .invite-btn:hover {
            transform: translateY(-2px);
        }

        .best-drop {
            font-size: 1rem;
            font-weight: 500;
            color: var(--tg-theme-text-color, #fff);
            margin-bottom: 20px;
            text-align: left;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .best-drop span {
            color: var(--tg-theme-button-color, #40a7e3);
            font-weight: 700;
        }

        @media (max-width: 400px) {
            .menu-item span {
                font-size: 1.6rem;
            }
            .menu-item p {
                font-size: 0.7rem;
            }
            h1 {
                font-size: 2rem;
            }
            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Главная страница -->
    <div id="home-page" class="container" style="display: block;">
        <h1>CELSER BOT</h1>
        <div class="subtitle">Открывай кейсы за звёзды! ⭐️</div>

        <div class="menu-grid">
            <div class="menu-item" id="casesBtn"><span>🎁</span><p>КЕЙСЫ</p></div>
            <div class="menu-item" id="upgradeBtn"><span>⬆️</span><p>АПГРЕЙД</p></div>
            <div class="menu-item" id="inventoryBtn"><span>📦</span><p>ИНВЕНТАРЬ</p></div>
            <div class="menu-item" id="gamesBtn"><span>🎮</span><p>ИГРЫ</p></div>
            <div class="menu-item" id="tasksBtn"><span>📋</span><p>ЗАДАНИЯ</p></div>
            <div class="menu-item" id="lotteryBtn"><span>🎲</span><p>ЛОТЕРЕЯ</p></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home">ГЛАВНАЯ</div>
            <div class="nav-item" id="nav-profile">ПРОФИЛЬ</div>
        </div>
        <div class="timer">⏳ 00:00</div>
    </div>
    <!-- Страница профиля -->
    <div id="profile-page" class="container" style="display: none;">
        <div class="profile-header">
            <div class="welu" id="profile-welu">WELU</div>
            <div class="profile-id" id="profile-id-display">ID: 1326919289</div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="profile-balance">0</div>
                <div class="stat-label">БАЛАНС ★</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="profile-referrals">0</div>
                <div class="stat-label">РЕФЕРАЛЫ ♥️</div>
            </div>
        </div>
        <div class="referral-block">
            <div class="referral-title">ПРИГЛАСИТЬ ДРУГА</div>
            <div class="referral-subtitle">ПОЛУЧАЙТЕ БОНУСЫ ВМЕСТЕ!</div>
            <button class="invite-btn" id="invite-btn">ПРИГЛАСИТЬ ДРУГА</button>
        </div>
        <div class="best-drop"><span>ЛУЧШИЙ ДРОП</span> · Сейчас ничего нет</div>
        <div class="bottom-nav">
            <div class="nav-item" id="nav-home-from-profile">ГЛАВНАЯ</div>
            <div class="nav-item active" id="nav-profile-from-profile">ПРОФИЛЬ</div>
        </div>
        <div class="timer">⏳ 00:00</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        const user = tg?.initDataUnsafe?.user;
        const homePage = document.getElementById('home-page');
        const profilePage = document.getElementById('profile-page');

        if (user) {
            document.getElementById('profile-welu').textContent = user.first_name.toUpperCase() || 'WELU';
            document.getElementById('profile-id-display').textContent = ID: ${user.id};
        }

        function addHandler(id, event, fn) {
            const el = document.getElementById(id);
            if (el) el.addEventListener(event, fn);
            else console.error('Элемент с id', id, 'не найден');
        }

        function showHome() {
            homePage.style.display = 'block';
            profilePage.style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-home')?.classList.add('active');
            document.getElementById('nav-home-from-profile')?.classList.add('active');
        }

        function showProfile() {
            homePage.style.display = 'none';
            profilePage.style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-profile')?.classList.add('active');
            document.getElementById('nav-profile-from-profile')?.classList.add('active');
        }

        addHandler('nav-home', 'click', showHome);
        addHandler('nav-profile', 'click', showProfile);
        addHandler('nav-home-from-profile', 'click', showHome);
        addHandler('nav-profile-from-profile', 'click', showProfile);

        addHandler('casesBtn', 'click', () => {
            if (tg) { tg.sendData(JSON.stringify({ action: 'open_cases' })); tg.close(); }
        });

        addHandler('upgradeBtn', 'click', () => {
            if (tg) tg.showPopup({ title: 'Апгрейд', message: 'Функция в разработке', buttons: [{ type: 'ok' }] });
        });

        addHandler('inventoryBtn', 'click', showProfile);

        addHandler('gamesBtn', 'click', () => {
            if (tg) tg.showPopup({ title: 'Игры', message: 'Функция в разработке', buttons: [{ type: 'ok' }] });
        });

        addHandler('tasksBtn', 'click', () => {
            if (tg) tg.showPopup({ title: 'Задания', message: 'Раздел в разработке', buttons: [{ type: 'ok' }] });
        });
        addHandler('lotteryBtn', 'click', () => {
            if (tg) tg.showPopup({ title: 'Лотерея', message: 'Раздел в разработке', buttons: [{ type: 'ok' }] });
        });

        addHandler('invite-btn', 'click', () => {
            if (tg) tg.showPopup({ title: 'Пригласить друга', message: 'Скопируйте реферальную ссылку и отправьте другу.', buttons: [{ type: 'ok' }] });
        });

        showHome();
        setInterval(() => document.querySelectorAll('.timer').forEach(t => t.textContent = '⏳ 00:00'), 1000);
    </script>
</body>
</html>
