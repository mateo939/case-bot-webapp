<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CELSER BOT</title>
</head>
<body>
    <h1>CELSER BOT</h1>
    <button id="casesBtn">КЕЙСЫ</button>
    <button id="inventoryBtn">ИНВЕНТАРЬ</button>
    <button id="nav-home">ГЛАВНАЯ</button>
    <button id="nav-profile">ПРОФИЛЬ</button>
    <div id="profile-page" style="display: none;">
        <p>Профиль</p>
        <button id="back-home">Назад</button>
    </div>
    <script>
        const home = document.getElementById('home-page');
        const profile = document.getElementById('profile-page');

        document.getElementById('casesBtn').onclick = () => alert('Кейсы');
        document.getElementById('inventoryBtn').onclick = () => {
            home.style.display = 'none';
            profile.style.display = 'block';
        };
        document.getElementById('nav-home').onclick = () => {
            home.style.display = 'block';
            profile.style.display = 'none';
        };
        document.getElementById('nav-profile').onclick = () => {
            home.style.display = 'none';
            profile.style.display = 'block';
        };
        document.getElementById('back-home').onclick = () => {
            profile.style.display = 'none';
            home.style.display = 'block';
        };
    </script>
</body>
</html>
