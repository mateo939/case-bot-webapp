<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CELSER BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('background.jpg');
            background-size: auto 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 60px;
            position: relative;
        }

        /* Фиксированная верхняя панель — чёрная */
        .top-bar-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #000000;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .balance-block {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 4px 12px;
        }

        .balance-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffd700;
        }

        .plus-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #40a7e3);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .plus-btn:hover {
            transform: scale(1.1);
        }

        /* Фиксированная нижняя навигация — чёрная, два пункта */
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #000000;
            border-top: 1px solid #333;
            padding: 8px 12px;
            z-index: 1000;
        }

        .nav-item-fixed {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item-fixed.active {
            color: var(--tg-theme-button-color, #40a7e3);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 360px;
            margin: 0 auto;
            padding: 16px;
            text-align: center;
        }

        /* Стили для главной страницы */
        .live-section {
            margin-bottom: 30px;
            text-align: left;
            padding-left: 8px;
        }
        .live-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
            margin-bottom: 10px;
        }

        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .wheel {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 4px solid gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 15px;
            transition: transform 0.1s ease-out;
        }

        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            background: conic-gradient(
                #ff6b6b 0deg 45deg,
                #feca57 45deg 90deg,
                #48dbfb 90deg 135deg,
                #1dd1a1 135deg 180deg,
                #f368e0 180deg 225deg,
                #ff9f43 225deg 270deg,
                #54a0ff 270deg 315deg,
                #5f27cd 315deg 360deg
            );
            clip-path: polygon(50% 50%, 100% 50%, 100% 100%);
            transform-origin: 0% 0%;
        }

        .sector:nth-child(1) { transform: rotate(0deg); }
        .sector:nth-child(2) { transform: rotate(45deg); }
        .sector:nth-child(3) { transform: rotate(90deg); }
        .sector:nth-child(4) { transform: rotate(135deg); }
        .sector:nth-child(5) { transform: rotate(180deg); }
        .sector:nth-child(6) { transform: rotate(225deg); }
        .sector:nth-child(7) { transform: rotate(270deg); }
        .sector:nth-child(8) { transform: rotate(315deg); }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: gold;
            border-radius: 50%;
            z-index: 2;
            border: 2px solid #fff;
        }

        .spin-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            margin-top: 5px;
        }

        /* Сетка кнопок – с большим скруглением и объёмом */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .menu-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        .menu-item span {
            display: block;
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .menu-item p {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        /* Страница игр — большая синяя кнопка */
        .games-header {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .game-button {
            background: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50px;
            padding: 40px 20px;
            margin: 20px 0;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.3);
            transition: transform 0.2s;
        }

        .game-button:hover {
            transform: translateY(-4px);
        }

        .game-button .game-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .game-button .game-subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.9);
        }

        /* Страница инвентаря */
        .cost-block {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 24px 20px;
            margin: 20px 0 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .cost-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #aaa);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .cost-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffd700;
            line-height: 1.2;
        }

        .refresh-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: fit-content;
            margin: 20px auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.3);
        }

        /* Страница профиля – карточки с большим скруглением */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .profile-info {
            text-align: left;
        }

        .profile-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
        }

        .profile-id {
            font-size: 0.9rem;
            color: var(--tg-theme-hint-color, #aaa);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 20px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffd700;
        }

        .stat-label {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-top: 6px;
        }
        /* Синяя рамка для приглашения друга */
        .invite-blue-block {
            background: var(--tg-theme-button-color, #40a7e3);
            border-radius: 50px;
            padding: 18px 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.3);
        }

        .invite-text {
            text-align: left;
        }

        .invite-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
        }

        .invite-subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
        }

        .invite-plus {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .best-drop-section {
            text-align: left;
            margin-bottom: 30px;
        }

        .best-drop-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .no-drops {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 18px;
            text-align: center;
            color: var(--tg-theme-hint-color, #aaa);
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        @media (max-width: 400px) {
            .wheel {
                width: 200px;
                height: 200px;
            }
            .stat-value {
                font-size: 2rem;
            }
            .cost-value {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Фиксированная верхняя панель -->
    <div class="top-bar-fixed">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">Ш</div>
            <span class="user-name" id="user-name">ШЕЛЛИ</span>
        </div>
        <div class="balance-block">
            <span class="balance-value" id="balance-display">0 ★</span>
            <span class="plus-btn" id="add-balance">+</span>
        </div>
    </div>

    <!-- Фиксированная нижняя навигация (ГЛАВНАЯ, ПРОФИЛЬ) -->
    <div class="bottom-nav-fixed">
        <div class="nav-item-fixed active" id="nav-home">ГЛАВНАЯ</div>
        <div class="nav-item-fixed" id="nav-profile">ПРОФИЛЬ</div>
    </div>

    <!-- Главная страница -->
    <div id="home-page" class="container" style="display: block;">
        <div class="live-section">
            <div class="live-title">LIVE</div>
            <div class="wheel-container">
                <div class="wheel" id="wheel">
                    <div class="sector"></div><div class="sector"></div><div class="sector"></div><div class="sector"></div>
                    <div class="sector"></div><div class="sector"></div><div class="sector"></div><div class="sector"></div>
                    <div class="wheel-center"></div>
                </div>
                <div class="spin-text">FREE SPIN</div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" id="casesBtn">
                <span>🎁</span>
                <p>КЕЙСЫ</p>
            </div>
            <div class="menu-item" id="upgradeBtn">
                <span>⬆️</span>
                <p>АПГРЕЙД</p>
            </div>
            <div class="menu-item" id="inventoryBtn">
                <span>📦</span>
                <p>ИНВЕНТАРЬ</p>
            </div>
            <div class="menu-item" id="gamesBtn">
                <span>🎮</span>
                <p>ИГРЫ</p>
            </div>
        </div>
    </div>

    <!-- Страница игр -->
    <div id="games-page" class="container" style="display: none;">
        <div class="games-header">ИГРЫ</div>
        <div class="game-button" id="rocket-game">
            <div class="game-title">ROCKET</div>
            <div class="game-subtitle">fly to the mars</div>
        </div>
    </div>

    <!-- Страница инвентаря -->
    <div id="inventory-page" class="container" style="display: none;">
        <div class="cost-block">
            <div class="cost-label">СТОИМОСТЬ</div>
            <div class="cost-value" id="inventory-cost">0 ★</div>
        </div>
        <button class="refresh-btn" id="refresh-inventory">🔄 Обновить</button>
    </div>

    <!-- Страница профиля -->
    <div id="profile-page" class="container" style="display: none;">
        <!-- Блок с аватаром и ID -->
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">Ш</div>
            <div class="profile-info">
                <div class="profile-name" id="profile-name">ШЕЛЛИ</div>
                <div class="profile-id" id="profile-id">ID: 1326919289</div>
            </div>
        </div>

        <!-- Блоки баланса и рефералов -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="profile-balance">0</div>
                <div class="stat-label">БАЛАНС ★</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="profile-referrals">0</div>
                <div class="stat-label">РЕФЕРАЛЫ ♥️</div>
            </div>
        </div>

        <!-- Блок приглашения друга в синей рамке -->
        <div class="invite-blue-block" id="invite-btn">
            <div class="invite-text">
                <div class="invite-title">ПРИГЛАСИТЬ ДРУГА</div>
                <div class="invite-subtitle">ПОЛУЧАЙТЕ БОНУСЫ ВМЕСТЕ!</div>
            </div>
            <div class="invite-plus">+</div>
        </div>

        <!-- Лучший дроп -->
        <div class="best-drop-section">
            <div class="best-drop-title">ЛУЧШИЙ ДРОП</div>
            <div class="no-drops">ПОКА НЕТ ДРОПОВ</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();
                tg.ready();
            }

            const user = tg?.initDataUnsafe?.user;

            // Элементы
            const userNameEl = document.getElementById('user-name');
            const userAvatarEl = document.getElementById('user-avatar');
            const profileNameEl = document.getElementById('profile-name');
            const profileAvatarEl = document.getElementById('profile-avatar');
            const profileIdEl = document.getElementById('profile-id');
            const balanceDisplay = document.getElementById('balance-display');
            const profileBalance = document.getElementById('profile-balance');
            const profileReferrals = document.getElementById('profile-referrals');
            const inventoryCost = document.getElementById('inventory-cost');

            if (user) {
                const firstName = user.first_name || 'ШЕЛЛИ';
                const upperName = firstName.toUpperCase();
                const initial = firstName.charAt(0).toUpperCase();

                userNameEl.textContent = upperName;
                profileNameEl.textContent = upperName;
                profileAvatarEl.textContent = initial;
                userAvatarEl.textContent = initial;
                profileIdEl.textContent = 'ID: ${user.id}';
            }
            // Баланс (заглушка)
            let currentBalance = 0;
            function updateBalances(balance) {
                currentBalance = balance;
                balanceDisplay.textContent = balance + ' ★';
                profileBalance.textContent = balance;
                inventoryCost.textContent = (balance * 2) + ' ★'; // пример
            }
            updateBalances(0);
            profileReferrals.textContent = '0';

            // Колесо
            const wheel = document.getElementById('wheel');
            function updateWheelRotation() {
                const maxScroll = document.body.scrollHeight - window.innerHeight;
                if (maxScroll > 0) {
                    const percent = window.scrollY / maxScroll;
                    const rotation = percent * 360;
                    if (wheel) wheel.style.transform = 'rotate(${rotation}deg)';
                }
            }
            window.addEventListener('scroll', updateWheelRotation);
            setTimeout(updateWheelRotation, 100);

            // Навигация
            function addHandler(id, event, fn) {
                const el = document.getElementById(id);
                if (el) el.addEventListener(event, fn);
            }

            const homePage = document.getElementById('home-page');
            const gamesPage = document.getElementById('games-page');
            const inventoryPage = document.getElementById('inventory-page');
            const profilePage = document.getElementById('profile-page');
            const navItems = document.querySelectorAll('.nav-item-fixed');

            function showHome() {
                homePage.style.display = 'block';
                gamesPage.style.display = 'none';
                inventoryPage.style.display = 'none';
                profilePage.style.display = 'none';
                navItems.forEach(i => i.classList.remove('active'));
                document.getElementById('nav-home').classList.add('active');
                window.scrollTo(0, 0);
            }

            function showGames() {
                homePage.style.display = 'none';
                gamesPage.style.display = 'block';
                inventoryPage.style.display = 'none';
                profilePage.style.display = 'none';
                navItems.forEach(i => i.classList.remove('active'));
                document.getElementById('nav-home').classList.add('active'); // подсветка главной
                window.scrollTo(0, 0);
            }

            function showInventory() {
                homePage.style.display = 'none';
                gamesPage.style.display = 'none';
                inventoryPage.style.display = 'block';
                profilePage.style.display = 'none';
                navItems.forEach(i => i.classList.remove('active'));
                document.getElementById('nav-home').classList.add('active');
                window.scrollTo(0, 0);
            }

            function showProfile() {
                homePage.style.display = 'none';
                gamesPage.style.display = 'none';
                inventoryPage.style.display = 'none';
                profilePage.style.display = 'block';
                navItems.forEach(i => i.classList.remove('active'));
                document.getElementById('nav-profile').classList.add('active');
                window.scrollTo(0, 0);
            }

            addHandler('nav-home', 'click', showHome);
            addHandler('nav-profile', 'click', showProfile);

            // Кнопки на главной
            addHandler('casesBtn', 'click', () => {
                if (tg) tg.sendData(JSON.stringify({ action: 'open_cases' }));
                else alert('Telegram Web App недоступен');
            });

            addHandler('upgradeBtn', 'click', () => {
                if (tg) tg.showPopup({ title: 'Апгрейд', message: 'Функция в разработке', buttons: [{ type: 'ok' }] });
                else alert('Функция в разработке');
            });

            addHandler('inventoryBtn', 'click', showInventory);
            addHandler('gamesBtn', 'click', showGames);

            // Кнопка в играх
            addHandler('rocket-game', 'click', () => {
                if (tg) tg.showPopup({ title: 'Rocket', message: 'Запуск игры...', buttons: [{ type: 'ok' }] });
                else alert('Игра');
            });

            // Плюс (пополнение)
            addHandler('add-balance', 'click', () => {
                if (tg) tg.showPopup({ title: 'Пополнение', message: 'Функция пополнения скоро появится', buttons: [{ type: 'ok' }] });
                else alert('Пополнение');
            });

            // Обновление инвентаря (имитация)
            addHandler('refresh-inventory', 'click', () => {
                if (tg) tg.sendData(JSON.stringify({ action: 'refresh_inventory' }));
                else alert('Обновление');
                updateBalances(currentBalance + 10);
            });

            // Блок приглашения друга
            addHandler('invite-btn', 'click', () => {
                if (tg) tg.showPopup({ title: 'Пригласить друга', message: 'Скопируйте реферальную ссылку и отправьте другу.', buttons: [{ type: 'ok' }] });
                else alert('Пригласить друга');
            });

            // Показываем главную
            showHome();
        })();
