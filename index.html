<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CELSER BOT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: url('background.jpg');
            background-size: auto 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
            box-sizing: border-box;
        }

        .container {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ffd700, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 30px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
        }

        .menu-item span {
            display: block;
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .menu-item p {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--tg-theme-text-color, #fff);
        }

        .info-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .info-links a {
            color: var(--tg-theme-link-color, #40a7e3);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .info-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.7rem;
            color: var(--tg-theme-hint-color, #777);
        }

        /* Стили для страницы профиля */
        #profile-page h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        #profile-info {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #profile-info p {
            margin: 10px 0;
            font-size: 1rem;
        }

        #profile-info strong {
            color: var(--tg-theme-button-color, #40a7e3);
        }
        .login-btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(64, 167, 227, 0.4);
        }

        #back-home {
            background: var(--tg-theme-secondary-bg-color, #2a2a4a);
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 400px) {
            body {
                padding: 20px 12px;
            }
            .menu-item {
                padding: 12px 5px;
            }
            .menu-item span {
                font-size: 1.8rem;
            }
            .menu-item p {
                font-size: 0.8rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Главная страница -->
    <div id="home-page" class="container">
        <h1>CELSER BOT</h1>
        <div class="subtitle">Открывай кейсы за звезды! ⭐️</div>

        <div class="menu-grid">
            <div class="menu-item" id="openCases">
                <span>🎁</span>
                <p>Открыть кейсы</p>
            </div>
            <div class="menu-item" id="profileBtn">
                <span>👤</span>
                <p>Мой профиль</p>
            </div>
        </div>

        <div class="info-links">
            <a href="#" id="about">О проекте</a>
            <a href="#" id="faq">Частые вопросы</a>
            <a href="#" id="support">Поддержка</a>
        </div>

        <div class="footer-note">
            v1.0 · Работает в Telegram
        </div>
    </div>

    <!-- Страница профиля (скрыта по умолчанию) -->
    <div id="profile-page" class="container" style="display: none;">
        <h2>Мой профиль</h2>
        <div id="profile-info">
            <p><strong>Имя:</strong> <span id="profile-name">Загрузка...</span></p>
            <p><strong>ID:</strong> <span id="profile-id"></span></p>
            <p><strong>Баланс:</strong> <span id="profile-balance">???</span> ⭐️</p>
            <p><strong>Инвентарь:</strong> <span id="profile-inventory">...</span></p>
        </div>
        <button class="login-btn" id="refresh-balance">🔄 Обновить баланс</button>
        <button class="login-btn" id="back-home">⬅️ Назад</button>
    </div>

    <!-- Правильный скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user;

        const homePage = document.getElementById('home-page');
        const profilePage = document.getElementById('profile-page');

        // Заполняем профиль, если есть данные пользователя
        if (user) {
            document.getElementById('profile-name').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('profile-id').textContent = user.id;
        } else {
            document.getElementById('profile-name').textContent = 'Неизвестно';
            document.getElementById('profile-id').textContent = '—';
        }

        // Переключение на профиль
        document.getElementById('profileBtn').addEventListener('click', () => {
            homePage.style.display = 'none';
            profilePage.style.display = 'block';
        });

        // Назад на главную
        document.getElementById('back-home').addEventListener('click', () => {
            profilePage.style.display = 'none';
            homePage.style.display = 'block';
        });

        // Кнопка "Обновить баланс"
        document.getElementById('refresh-balance').addEventListener('click', () => {
            tg.sendData(JSON.stringify({ action: 'get_profile' }));
            tg.close();
        });

        // Открытие кейсов
        document.getElementById('openCases').addEventListener('click', () => {
            tg.sendData(JSON.stringify({ action: 'open_cases' }));
        });

        // Обработчики ссылок
        document.getElementById('about').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({ title: 'О проекте', message: 'CELSER BOT — игровой бот.', buttons: [{ type: 'ok' }] });
        });

        document.getElementById('faq').addEventListener('click', (e) => {
            e.preventDefault();
            tg.showPopup({ title: 'Частые вопросы', message: 'Как получить звёзды?\nКак открыть кейс?', buttons: [{ type: 'ok' }] });
        });

        document.getElementById('support').addEventListener('click', (e) => {
            e.preventDefault();
            tg.openLink('https://t.me/your_support_bot');
        });
    </script>
</body>
</html>
